<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hanbill Tech Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f7f8fc; --surface: #ffffff; --border: #e4e4e7; --border-hover: #a5b4fc;
      --text-primary: #18181b; --text-secondary: #52525b; --text-muted: #a1a1aa;
      --accent: #6366f1; --accent-light: #ede9fe; --accent-text: #5b21b6;
      --radius-card: 16px; --radius-sm: 999px; --font: 'Noto Sans KR', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 32px 0 20px; }
    .logo { font-size: 20px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; cursor: pointer; }
    .logo span { color: var(--accent); }
    .tagline { font-size: 12px; color: var(--text-muted); letter-spacing: 0.02em; }
    
    .chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .chip { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); transition: all 0.15s; cursor: pointer; }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
    .card { background: var(--surface); border-radius: var(--radius-card); border: 1px solid var(--border); overflow: hidden; transition: all 0.2s; cursor: pointer; height: 100%; display: flex; flex-direction: column; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1); border-color: var(--border-hover); }
    
    .card-content { padding: 24px; flex-grow: 1; }
    .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; }
    .badge.tech { background: var(--accent-light); color: var(--accent-text); }
    .badge.health { background: #dcfce7; color: #166534; }
    .badge.daily { background: #fef3c7; color: #92400e; }
    .badge.etc { background: #f4f4f5; color: #71717a; }

    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; color: var(--text-primary); }
    .card-excerpt { font-size: 14px; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { padding: 0 24px 24px; font-size: 12px; color: var(--text-muted); }

    /* 상세 페이지 */
    #article-view { display: none; }
    .fade { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-muted); margin-bottom: 32px; cursor: pointer; font-weight: 500; transition: color 0.2s; }
    .back-btn:hover { color: var(--accent); }
    .art-title { font-size: 32px; font-weight: 700; margin: 16px 0; line-height: 1.3; color: var(--text-primary); }
    .art-meta { font-size: 14px; color: var(--text-muted); margin-bottom: 40px; }
    .art-body { font-size: 17px; line-height: 1.8; color: var(--text-secondary); white-space: pre-wrap; }
    .loading { text-align: center; padding: 100px 0; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="logo" id="logo-link">Hanbill <span>Tech</span></div>
      <div class="tagline">Insight & Technology</div>
    </header>

    <nav class="chips" id="chips-wrap">
      <div class="chip on" data-cat="전체">전체</div>
      <div class="chip" data-cat="기술">기술</div>
      <div class="chip" data-cat="건강">건강</div>
      <div class="chip" data-cat="일상">일상</div>
    </nav>

    <!-- 목록 화면 -->
    <main id="list-view">
      <div class="grid" id="posts-grid"></div>
    </main>

    <!-- 상세 화면 -->
    <article id="article-view">
      <div class="back-btn" id="back-btn">← 목록으로 돌아가기</div>
      <div id="art-content" class="fade"></div>
    </article>
  </div>

  <script>
    const client = supabase.createClient('https://bdzgitzpbgdbvtygdtgq.supabase.co/', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkemdpdHpwYmdkYnZ0eWdkdGdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzY1MTAsImV4cCI6MjA5MTA1MjUxMH0.mL9FAAJY4O9YkkFlPRg1PF7QPgY60ZQxHrp92yQSres');
    
    let allPosts = [];
    let currentCat = '전체';
    const grid = document.getElementById('posts-grid');
    const listView = document.getElementById('list-view');
    const articleView = document.getElementById('article-view');
    const artContent = document.getElementById('art-content');

    /* 헬퍼 함수들 */
    const badgeClass = (cat) => {
      if (cat === '기술') return 'tech';
      if (cat === '건강') return 'health';
      if (cat === '일상') return 'daily';
      return 'etc';
    };
    const formatDate = (dateStr) => new Date(dateStr).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
    const markdownToHtml = (text) => text; // 필요 시 라이브러리 추가

    async function init() {
      const { data } = await client.from('posts').select('*').order('created_at', { ascending: false });
      allPosts = data || [];
      checkRoute();
    }

    function checkRoute() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (id) {
        const idx = allPosts.findIndex(p => p.id == id);
        if (idx > -1) { showDetail(idx, false); return; }
      }
      showList();
    }

    function renderList(posts) {
      grid.innerHTML = posts.length ? '' : '<div class="loading">포스팅이 없습니다.</div>';
      posts.forEach((post) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => showDetail(allPosts.indexOf(post));
        card.innerHTML = `
          <div class="card-content">
            <span class="badge ${badgeClass(post.category)}">${post.category || '기타'}</span>
            <div class="card-title">${post.title}</div>
            <div class="card-excerpt">${post.content}</div>
          </div>
          <div class="card-footer">${formatDate(post.created_at)}</div>
        `;
        grid.appendChild(card);
      });
    }

    function showDetail(idx, pushState = true) {
      const post = allPosts[idx];
      if (pushState) history.pushState({idx}, '', '?id=' + post.id);
      
      artContent.innerHTML = `
        <span class="badge ${badgeClass(post.category)}">${post.category || '기타'}</span>
        <div class="art-title">${post.title}</div>
        <div class="art-meta">
          ${formatDate(post.created_at)}
          ${post.read_time ? ' &nbsp;·&nbsp; 읽는 시간 약 ' + post.read_time : ''}
        </div>
        <div class="art-body">${markdownToHtml(post.content)}</div>
      `;

      listView.style.display = 'none';
      articleView.style.display = 'block';
      
      // 애니메이션 재실행
      artContent.classList.remove('fade');
      void artContent.offsetWidth;
      artContent.classList.add('fade');

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showList() {
      if (window.location.search) history.pushState({}, '', window.location.pathname);
      articleView.style.display = 'none';
      listView.style.display = 'block';
      renderList(currentCat === '전체' ? allPosts : allPosts.filter(p => p.category === currentCat));
    }

    /* 이벤트 바인딩 */
    document.getElementById('back-btn').onclick = showList;
    document.getElementById('logo-link').onclick = showList;
    document.getElementById('chips-wrap').onclick = (e) => {
      const chip = e.target.closest('.chip');
      if (!chip) return;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
      chip.classList.add('on');
      currentCat = chip.dataset.cat;
      showList();
    };

    window.onpopstate = checkRoute;
    init();
  </script>
</body>
</html>
