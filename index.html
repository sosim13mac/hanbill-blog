<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hanbill Tech Blog</title>
  
  <meta name="description" content="한빌 테크 블로그 - 건강하고 유익한 기술 정보">
  <meta property="og:title" content="Hanbill Tech Blog">
  <meta property="og:description" content="건강한 먹거리와 기술 정보를 전합니다.">
  <meta property="og:type" content="website">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f7f8fc; --surface: #ffffff; --border: #e4e4e7;
      --text-primary: #18181b; --text-secondary: #52525b;
      --text-muted: #a1a1aa; --accent: #6366f1;
      --radius-card: 16px; --font: 'Noto Sans KR', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 32px 0 20px; }
    .logo { font-size: 22px; font-weight: 700; color: var(--text-primary); cursor: pointer; }
    .logo span { color: var(--accent); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
    .card { background: var(--surface); border-radius: var(--radius-card); border: 1px solid var(--border); overflow: hidden; transition: all 0.3s; cursor: pointer; height: 100%; display: flex; flex-direction: column; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); border-color: var(--accent); }
    .card-content { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; line-height: 1.4; color: var(--text-primary); }
    .card-excerpt { font-size: 14px; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 20px; }
    .card-footer { margin-top: auto; font-size: 12px; color: var(--text-muted); }
    #article-view { display: none; animation: fadeIn 0.4s ease; }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); margin-bottom: 32px; cursor: pointer; }
    .art-title { font-size: 32px; font-weight: 700; margin: 16px 0; line-height: 1.3; }
    .art-body { font-size: 17px; line-height: 1.8; color: var(--text-secondary); white-space: pre-wrap; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="logo" onclick="goHome()">Hanbill <span>Tech</span></div>
    </header>
    <main id="list-view">
      <div class="grid" id="posts-grid"></div>
    </main>
    <article id="article-view">
      <div class="back-btn" onclick="goHome()">← 목록으로 돌아가기</div>
      <div id="art-content"></div>
    </article>
  </div>

  <script>
    const SUPABASE_URL = 'https://bdzgitzpbgdbvtygdtgq.supabase.co/';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkemdpdHpwYmdkYnZ0eWdkdGdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzY1MTAsImV4cCI6MjA5MTA1MjUxMH0.mL9FAAJY4O9YkkFlPRg1PF7QPgY60ZQxHrp92yQSres';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allPosts = [];

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id');

      const { data, error } = await client.from('posts').select('*').order('created_at', { ascending: false });
      allPosts = data || [];
      
      if (postId) {
        const postIdx = allPosts.findIndex(p => p.id == postId);
        if (postIdx > -1) showDetail(postIdx, false);
        else renderList(allPosts);
      } else {
        renderList(allPosts);
      }
    }

    function renderList(posts) {
      document.getElementById('list-view').style.display = 'block';
      document.getElementById('article-view').style.display = 'none';
      const grid = document.getElementById('posts-grid');
      grid.innerHTML = '';
      posts.forEach((post, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => showDetail(idx);
        card.innerHTML = `
          <div class="card-content">
            <div class="card-title">${post.title}</div>
            <div class="card-excerpt">${post.content}</div>
            <div class="card-footer">${new Date(post.created_at).toLocaleDateString()}</div>
          </div>`;
        grid.appendChild(card);
      });
    }

    function showDetail(idx, pushState = true) {
      const post = allPosts[idx];
      if (pushState) history.pushState({idx}, '', '?id=' + post.id);
      
      document.getElementById('art-content').innerHTML = `
        <div class="art-title">${post.title}</div>
        <div class="art-body">${post.content}</div>
      `;
      document.getElementById('list-view').style.display = 'none';
      document.getElementById('article-view').style.display = 'block';
      window.scrollTo(0, 0);
    }

    function goHome() {
      history.pushState({}, '', window.location.pathname);
      renderList(allPosts);
    }

    window.onpopstate = () => {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (id) {
        const idx = allPosts.findIndex(p => p.id == id);
        if (idx > -1) showDetail(idx, false);
      } else {
        renderList(allPosts);
      }
    };

    init();
  </script>
</body>
</html>
