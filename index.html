<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hanbill Tech Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- ✅ Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f7f8fc;
      --surface: #ffffff;
      --border: #e4e4e7;
      --text-primary: #18181b;
      --text-secondary: #52525b;
      --text-muted: #a1a1aa;
      --accent: #6366f1;
      --radius-card: 16px;
      --font: 'Noto Sans KR', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    
    .wrap { max-width: 860px; margin: 0 auto; padding: 0 24px 80px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 32px 0 20px; }
    .logo { font-size: 22px; font-weight: 700; color: var(--text-primary); cursor: pointer; }
    .logo span { color: var(--accent); }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 0 28px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .chip { font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* 카드 그리드 */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
    .card { background: var(--surface); border-radius: var(--radius-card); border: 1px solid var(--border); overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; height: 100%; display: flex; flex-direction: column; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1); border-color: var(--accent); }
    .card-content { padding: 24px; flex-grow: 1; display: flex; flex-direction: column; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; line-height: 1.4; color: var(--text-primary); }
    .card-excerpt { font-size: 14px; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 20px; }
    .card-footer { margin-top: auto; font-size: 12px; color: var(--text-muted); }

    /* 상세 보기 */
    #article-view { display: none; animation: fadeIn 0.4s ease; }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); margin-bottom: 32px; cursor: pointer; }
    .back-btn:hover { color: var(--accent); }
    .art-header { margin-bottom: 40px; }
    .art-title { font-size: 32px; font-weight: 700; margin: 16px 0; line-height: 1.3; }
    .art-body { font-size: 17px; line-height: 1.8; color: var(--text-secondary); white-space: pre-wrap; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .status { text-align: center; padding: 60px 0; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="logo" id="logo-link">Hanbill <span>Tech</span></div>
      <div class="tagline">Insight & Technology</div>
    </header>

    <nav class="chips" id="chips-wrap">
      <div class="chip on" data-cat="전체">전체</div>
      <div class="chip" data-cat="기술">기술</div>
      <div class="chip" data-cat="건강">건강</div>
      <div class="chip" data-cat="일상">일상</div>
    </nav>

    <!-- 목록 화면 -->
    <main id="list-view">
      <div class="grid" id="posts-grid">
        <div class="status">포스팅을 불러오는 중...</div>
      </div>
    </main>

    <!-- 상세 화면 -->
    <article id="article-view">
      <div class="back-btn" id="back-btn">← 목록으로 돌아가기</div>
      <div id="art-content"></div>
    </article>
  </div>

  <script>
    const SUPABASE_URL = 'https://bdzgitzpbgdbvtygdtgq.supabase.co/';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkemdpdHpwYmdkYnZ0eWdkdGdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NzY1MTAsImV4cCI6MjA5MTA1MjUxMH0.mL9FAAJY4O9YkkFlPRg1PF7QPgY60ZQxHrp92yQSres';
    
    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_KEY);

    let allPosts = [];
    const grid = document.getElementById('posts-grid');
    const listView = document.getElementById('list-view');
    const articleView = document.getElementById('article-view');
    const artContent = document.getElementById('art-content');

    async function fetchPosts(category = '전체') {
      grid.innerHTML = '<div class="status">로딩 중...</div>';
      try {
        let query = client.from('posts').select('*').order('created_at', { ascending: false });
        // 만약 DB에 category 컬럼이 있다면 필터링 (없을 경우 전체 표시)
        // if (category !== '전체') query = query.eq('category', category);
        
        const { data, error } = await query;
        if (error) throw error;
        allPosts = data || [];

        if (allPosts.length === 0) {
          grid.innerHTML = '<div class="status">포스팅이 없습니다.</div>';
          return;
        }
        renderList(allPosts);
      } catch (err) {
        grid.innerHTML = '<div class="status">데이터를 불러오지 못했습니다.</div>';
      }
    }

    function renderList(posts) {
      grid.innerHTML = '';
      posts.forEach((post, idx) => {
        const date = new Date(post.created_at).toLocaleDateString('ko-KR');
        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => showDetail(idx);
        card.innerHTML = `
          <div class="card-content">
            <div class="card-title">${post.title}</div>
            <div class="card-excerpt">${post.content}</div>
            <div class="card-footer">${date}</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function showDetail(idx) {
      const post = allPosts[idx];
      const date = new Date(post.created_at).toLocaleDateString('ko-KR');
      artContent.innerHTML = `
        <div class="art-header">
          <div class="art-title">${post.title}</div>
          <div class="art-meta" style="color:#a1a1aa; font-size:14px;">${date}</div>
        </div>
        <div class="art-body">${post.content}</div>
      `;
      listView.style.display = 'none';
      articleView.style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showList() {
      articleView.style.display = 'none';
      listView.style.display = 'block';
    }

    document.getElementById('back-btn').onclick = showList;
    document.getElementById('logo-link').onclick = showList;
    document.getElementById('chips-wrap').onclick = (e) => {
      if (!e.target.classList.contains('chip')) return;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
      e.target.classList.add('on');
      fetchPosts(e.target.dataset.cat);
    };

    fetchPosts();
  </script>
</body>
</html>
